<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kiểm tra giữa kỳ 2</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* Tiêu đề nhiều màu */
h1{
    text-align:center;
    font-size:160%;
    background: linear-gradient(to right, #ff4d4d, #ffcc00, #33cc33, #3399ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h2{
    text-align:center;
    color:#ff66a3;
}

/* Khung */
.card{
    border:2px solid #2e7d32;
    border-radius:12px;
    padding:20px;
    max-width:340px;
    margin:20px auto;
    background:white;
}

/* tiêu đề card */
.card h3{
    text-align:center;
    color:#ff6600;
}

/* đoạn sở thích nhiều màu */
.card p{
    text-align:center;
    line-height:1.6;
    font-size:15px;
    background: linear-gradient(to right, #ff0000, #ff9900, #00cc66, #0066ff, #cc00cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ảnh */
.card img{
    display:block;
    margin:auto;
    max-width:100%;
    height:auto;
    border-radius:10px;
    transition:0.3s;
}

/* hover */
.card img:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(46,125,50,0.5);
}
</style>

</head>

<body>

<h1>Kiểm tra giữa kỳ II</h1>
<h2>Huỳnh Thị Xuân Nhi - Lớp 12C2</h2>

<div class="card">
    <h3>Sở thích của em</h3>

    <p>
        Trong thời gian rảnh, em thường nghe nhạc để thư giãn, chơi game để giải trí sau những giờ học căng thẳng. 
        Ngoài ra, em còn thích lướt mạng xã hội, xem phim và dành thời gian đi chơi cùng bạn bè để tạo thêm nhiều kỷ niệm vui vẻ.
    </p>

    <a href="https://ibb.co/20vfczq2" target="_blank">
        <img src="https://i.ibb.co/Q7P1YW9B/Messenger-creation-52-C8-E72-D-C690-4-B79-84-EF-080373-AA6-F1-D.jpg" alt="anh so thich">
    </a>
</div>

</body>
</html>
